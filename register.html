<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTER-PAGE</title>
    <link rel="stylesheet" href="bootstrap.min.css">
    <link rel="stylesheet" href="register.css">
    <!-- <script src="script.js" defer></script> -->
    <script src="register.js" defer></script>
</head>

<body>
    <header>
        <div class="container mt-4 bg-dark text-white board rounded-5 text-center ">
            <div class="row">
                <div class="col ">
                    <h1>REGISTER & PUBLISH YOUR POST</h1>

                </div>
            </div>
        </div>
    </header>
    <hr>
    <main class="m-3 ">
        <section class="registration-card bg-dark text-white mx-auto board rounded-5 ">
            <div class="container ">
                <div class="row">
                    <div class="col">
                        <h3>Register Here</h3>
                        <hr>
                        <form class="row g-3 " id="reg-form">
                            <div class="row g-3">
                                <div class="col">

                                    <input id="fname" type="text" class="form-control" placeholder="First name"
                                        aria-label="First name">
                                </div>
                                <div class="col">
                                    <input id="lname" type="text" class="form-control" placeholder="Last name"
                                        aria-label="Last name">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label for="inputEmail4" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email">
                            </div>
                            <div class="col-md-6">
                                <label for="inputPassword4" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password">
                            </div>
                            <hr>
                            <div class="col">
                                <button id="register-btn" type="submit" class="btn btn-primary w-100 ">Register
                                </button>
                            </div>
                        </form>

                    </div>
                </div>
                <a href="index.html">
                    <button id="" type="button" class="btn btn-primary w-100 mt-3">GO TO LOGIN </button>
                </a>
            </div>

        </section>

    </main>




    <script src="bootstrap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.21/dist/sweetalert2.all.min.js"></script>

</body>

</html>
