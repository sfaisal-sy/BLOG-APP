<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POST-PAGE</title>
    <link rel="stylesheet" href="bootstrap.min.css">
    <link rel="stylesheet" href="postpage.css">
    <script src="postpage.js" defer></script>
</head>

<body>
    <header class="p-3">
         <div class="container mt-4 bg-dark text-white board rounded-5 text-center  ">
            <div class="row">
                <div class="col ">
                    <h1>PUBLISH YOUR POST</h1>
                </div>
            </div>
        </div>
        <hr>
        <div class="container mt-4 bg-dark text-white board rounded-5  text-center">
            <div class="row">
                <div class="col">
                    <div class="mb-3">
                        <label for="exampleFormControlTextarea1" class="form-label mb-3">Write Your Post</label>
                        <textarea id="post" class="form-control bg-dark text-white "  id="exampleFormControlTextarea1" rows="3"></textarea>
                    </div>
                    <div class="d-grid gap-2 col-6 mx-auto">
                        <button id="submit-btn" class="btn btn-primary" type="button">PUBLISH</button>
                    </div>
                </div>
            </div>
        </div>
        <hr>
    </header>
    <!-- ///////////////////////////////////////////////////////////////////// -->
    <div class="container ">
        <div class="row">
            <div class="col">
                <table class="table table-dark table-bordered border-primary">
                    <thead style="text-align: center;">
                        <th>S.NO</th>
                        <th class="w-50">POST</th>
                       
                        <th>Edit</th>
                        <th>Delete</th>                        
                    </thead>
                    <tbody id="tbody" >
                        <!-- post render here -->
                    </tbody>
            
                </table>
            </div>
        </div>
    </div>


    
    <script src="bootstrap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.21/dist/sweetalert2.all.min.js"></script>

</body>

</html>
